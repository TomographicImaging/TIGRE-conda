[workspace]
channels = ["nvidia", "conda-forge"]
platforms = ["linux-64", "win-64"]
preview = ["pixi-build"]

[system-requirements]
cuda = "12"

[workspace.build-variants]
python = ["3.10.*", "3.11.*", "3.12.*", "3.13.*", "3.14.*"]

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.build.source]
git = "https://github.com/CERN/TIGRE.git"
rev = "8972994037bd2730fc6e6f43a1c2b169adc91670"  # 3.1.3 (must be >=3.1 due to TIGRE build system)

[package.build.config]
compilers = ["cxx"]

# This will be default at some point, at which stage this can be removed
ignore-pypi-mapping = false

[package.build-dependencies]
cuda-version = ">=12"
cuda-toolkit = "*"

[package.host-dependencies]
python = "*"
cuda-version = ">=12"

[package.target.linux-64.host-dependencies]
cuda-cudart-dev_linux-64 = "*"

[package.target.win-64.host-dependencies]
cuda-cudart-dev_win-64 = "*"

[package.run-dependencies]
python = "*"
cuda-version = ">=12"
__cuda = "*"
